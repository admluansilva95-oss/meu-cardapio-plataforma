name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Latin-1 / ByteString gate (fonte)
      run: npm run check:wire-latin1

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: npm run test:e2e
      env:
        # O `webServer` corre `next dev`; sem estas variáveis o cliente Supabase no browser fica vazio e os testes falham.
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
        E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        E2E_RESTAURANT_SLUG: ${{ secrets.E2E_RESTAURANT_SLUG }}

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
